syntax = "proto3";

package user;

option go_package = "go_grpc_user/proto;userpb";

service UserService {
    rpc GetUser(GetUserRequest) returns (User);
    rpc GetUsers(GetUsersRequest) returns (stream User);

    // client streaminh
    rpc CreateUsers(stream CreateUserRequest) returns (CreateUserResponse);
}

message GetUserRequest {
    int32 id = 1;
}

message GetUsersRequest {}

message User {
    int32 id = 1;
    string name = 2;
    string email = 3;
    string username = 4;
    string role = 5;
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string username = 3;
    string password = 4;
    string role = 5;
}

message CreateUserResponse {
    int32 created_count = 1;
    string message = 2;
}